name: "🧠 Extract Knowledge & Update Memory"

on:
  schedule:
    # JST 6:00 (UTC 21:00前日) — news-delivery(10:00/15:00)より前にAPIクォータを使用
    - cron: "0 21 * * *"
  workflow_dispatch:
    # 手動実行にも対応

concurrency:
  group: extract-knowledge
  cancel-in-progress: false

permissions:
  contents: write

env:
  TZ: "Asia/Tokyo"

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: "🐍 Setup Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "scripts/requirements.txt"

      - name: "📦 Install dependencies"
        run: pip install -r scripts/requirements.txt

      - name: "🧠 Extract knowledge & build RAG database"
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p data/knowledge_base
          # 未処理記事から知識を抽出して knowledge_base に追記
          # --limit 20: 1回の実行で最大20件処理 (Gemini Flash-Lite レート制限対策)
          python scripts/extract_knowledge.py --limit 20

      - name: "📉 Update episodic memory decay"
        run: |
          mkdir -p data/episodic_memory
          # 忘却曲線による保持率を毎回更新
          python scripts/memory_manager.py decay

      - name: "💾 Commit & push knowledge base"
        run: |
          git config user.name "NewsAI Bot"
          git config user.email "newsai-bot@users.noreply.github.com"
          git add data/knowledge_base/ || true
          git add data/episodic_memory/ || true
          git add data/processed_ids.json || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "🧠 Update knowledge base $(date +%Y-%m-%dT%H:%M) [skip ci]"

          # Retry logic for push (競合対策)
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            if git push; then
              echo "Push successful (attempt $i)"
              exit 0
            fi
            echo "Push failed (attempt $i/$MAX_RETRIES), pulling and retrying..."
            git pull --rebase
            sleep 3
          done
          echo "Push failed after $MAX_RETRIES retries"
          exit 1

      - name: "🚨 Notify Discord on failure"
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL not set, skipping notification"
            exit 0
          fi
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"username\": \"NewsAI Bot\",
              \"content\": \"🚨 **知識抽出が失敗しました**\nワークフロー: \`${{ github.workflow }}\`\n実行ID: [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n時刻: $(date '+%Y-%m-%d %H:%M JST')\"
            }"
