# ============================================================
# ⚠️ SETUP — コードは完成、環境設定が必要
# ============================================================
setup_required:

  - id: SETUP-01
    title: "GitHub リポジトリ push + Secrets 設定"
    priority: high
    effort: S (5分)
    steps:
      - "git remote add origin → git push"
      - "GitHub Settings → Secrets → DISCORD_WEBHOOK_URL"
      - "GitHub Settings → Secrets → GEMINI_API_KEY"

  - id: SETUP-02
    title: "Cloudflare KV ネームスペース作成"
    priority: high
    effort: S (10分)
    steps:
      - "cd worker && npx wrangler kv:namespace create SESSION_KV"
      - "npx wrangler kv:namespace create MEMORY_KV"
      - "取得した ID を wrangler.toml の id フィールドに記入"

  - id: SETUP-03
    title: "wrangler.toml の GITHUB_OWNER 書き換え"
    priority: high
    effort: S (1分)
    file: worker/wrangler.toml
    action: "REPLACE_WITH_YOUR_GITHUB_USERNAME を自分の GitHub ユーザー名に変更"

  - id: SETUP-04
    title: "Cloudflare Worker Secrets 設定"
    priority: high
    effort: S (5分)
    steps:
      - "npx wrangler secret put DISCORD_APPLICATION_ID"
      - "npx wrangler secret put DISCORD_PUBLIC_KEY"
      - "npx wrangler secret put GEMINI_API_KEY"

  - id: SETUP-05
    title: "Discord Bot アプリケーション作成"
    priority: high
    effort: S (10分)
    steps:
      - "https://discord.com/developers/applications でアプリ作成"
      - "Application ID と Public Key を SETUP-04 に使用"
      - "Interactions Endpoint URL に Worker の URL を設定"
      - "Bot をサーバーに招待"

  - id: SETUP-06
    title: "スラッシュコマンド登録（初回のみ）"
    priority: high
    effort: S (1分)
    steps:
      - "cd worker"
      - "DISCORD_APPLICATION_ID=xxx DISCORD_BOT_TOKEN=yyy node src/register-commands.js"

  - id: SETUP-07
    title: "Worker デプロイ"
    priority: high
    effort: S (2分)
    steps:
      - "cd worker && npx wrangler deploy"
      - "または main ブランチに push して deploy-worker.yml を自動実行"


